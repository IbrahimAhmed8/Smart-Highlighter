<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Highlighter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Satoshi', sans-serif; background-color: #F3F4F6; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
        .mode-selected { border-color: #3b82f6 !important; box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="h-[100dvh] flex overflow-hidden text-gray-800 bg-gray-100">

    <aside class="hidden md:flex w-64 bg-white border-r border-gray-200 flex-col flex-shrink-0 z-20">
        <div class="h-16 flex items-center px-6 border-b border-gray-50/50">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">SH</div>
                <span class="font-bold text-lg tracking-tight">Smart Highlight</span>
            </div>
        </div>
        
        <nav class="flex-1 px-3 mt-4 space-y-1 overflow-y-auto">
            <button onclick="resetApp()" class="w-full flex items-center gap-3 px-3 py-2 bg-blue-600 text-white rounded-lg group shadow-sm shadow-blue-200 hover:bg-blue-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                <span class="text-sm font-medium">New Analysis</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-gray-200">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gray-900 flex items-center justify-center font-bold text-white">US</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">User</p>
                    <p class="text-xs text-green-500 font-bold truncate">● Online</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white md:m-2 md:rounded-2xl border-none md:border border-gray-200 shadow-sm relative overflow-hidden">
        
        <header class="h-14 md:h-16 flex items-center justify-between px-4 md:px-8 border-b border-gray-100 flex-shrink-0">
            <button onclick="resetApp()" class="md:hidden flex items-center justify-center w-8 h-8 bg-blue-50 text-blue-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
            </button>
            <h2 class="text-base md:text-lg font-bold text-gray-900 truncate" id="header-title">AI Analyzer</h2>
            <div id="status-badge" class="hidden px-2 md:px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] md:text-xs font-bold border border-green-200">
                Complete
            </div>
        </header>

        <div id="workspace" class="flex-1 overflow-y-auto w-full relative flex flex-col p-4 md:p-8">
            
            <div id="welcome-screen" class="w-full max-w-3xl mx-auto pt-4 md:pt-0">
                <div class="text-center mb-6 md:mb-10">
                    <h1 class="text-2xl md:text-4xl font-bold text-gray-900 mb-2 tracking-tight">Select a Mode & Attach PDF</h1>
                    <p class="text-sm md:text-lg text-gray-500">Choose how Gemini should analyze your document.</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 w-full mb-8">
                    <button onclick="selectMode('study', this)" class="mode-card mode-selected group p-4 md:p-5 bg-white border-2 border-blue-500 rounded-2xl text-left hover:shadow-md transition-all">
                        <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center text-orange-600 text-xl mb-3">📚</div>
                        <h3 class="font-bold text-gray-900 mb-1 text-sm md:text-base">Study Mode</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">Extracts key definitions, concepts, and formulas.</p>
                    </button>

                    <button onclick="selectMode('cyber', this)" class="mode-card group p-4 md:p-5 bg-white border-2 border-gray-100 rounded-2xl text-left hover:border-gray-300 hover:shadow-md transition-all">
                        <div class="w-10 h-10 rounded-xl bg-gray-900 flex items-center justify-center text-green-400 text-xl mb-3">🛡️</div>
                        <h3 class="font-bold text-gray-900 mb-1 text-sm md:text-base">Cybersecurity</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">Finds vulnerabilities, CVSS, and remediation steps.</p>
                    </button>

                    <button onclick="selectMode('code', this)" class="mode-card group p-4 md:p-5 bg-white border-2 border-gray-100 rounded-2xl text-left hover:border-gray-300 hover:shadow-md transition-all">
                        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 text-xl mb-3">💻</div>
                        <h3 class="font-bold text-gray-900 mb-1 text-sm md:text-base">Code Analysis</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">Identifies functions, core logic, and bug-prone areas.</p>
                    </button>

                    <button onclick="selectMode('medical', this)" class="mode-card group p-4 md:p-5 bg-white border-2 border-gray-100 rounded-2xl text-left hover:border-gray-300 hover:shadow-md transition-all">
                        <div class="w-10 h-10 rounded-xl bg-pink-100 flex items-center justify-center text-pink-600 text-xl mb-3">⚕️</div>
                        <h3 class="font-bold text-gray-900 mb-1 text-sm md:text-base">Medical</h3>
                        <p class="text-xs text-gray-500 leading-relaxed">Highlights symptoms, diagnostics, and meds.</p>
                    </button>
                </div>
            </div>

            <div id="loading-screen" class="hidden flex-col items-center justify-center h-full flex-1">
                <svg class="animate-spin h-10 w-10 md:h-12 md:w-12 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <h2 class="text-lg md:text-xl font-bold text-gray-800 text-center">Reading & Highlighting...</h2>
                <p class="text-xs md:text-sm text-gray-500 mt-2 text-center px-4">Gemini is analyzing the document.</p>
            </div>

            <div id="result-container" class="hidden w-full flex-col lg:flex-row gap-4 md:gap-6 pb-6 md:pb-24 min-h-full">
                <div class="w-full lg:w-1/3 min-h-[250px] max-h-[40vh] lg:max-h-full bg-gray-50 rounded-xl border border-gray-200 flex flex-col overflow-hidden shadow-inner flex-shrink-0">
                    <div class="bg-white px-4 md:px-5 py-3 border-b border-gray-200 flex items-center justify-between sticky top-0 shadow-sm z-10">
                        <h3 class="font-bold text-gray-800 text-sm flex items-center gap-2">
                            <span>✨</span> Extracted Insights
                        </h3>
                        <span id="sentence-count-badge" class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 md:p-5">
                        <ol id="extracted-sentences-list" class="space-y-3 md:space-y-4 text-xs md:text-sm text-gray-800 list-decimal list-outside ml-4 marker:text-blue-500 marker:font-bold">
                        </ol>
                    </div>
                </div>

                <div class="w-full lg:w-2/3 flex flex-col gap-3 flex-1">
                    <button id="download-pdf-btn" class="w-full md:w-auto self-end flex items-center justify-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold text-sm shadow-md transition-colors hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                        Download Highlighted PDF
                    </button>
                    <embed id="pdf-viewer" type="application/pdf" class="w-full h-[50vh] lg:h-full lg:min-h-[600px] rounded-xl border border-gray-200 shadow-inner flex-1" src="" />
                </div>
            </div>

        </div>

        <div class="flex-shrink-0 w-full bg-white md:bg-transparent border-t border-gray-200 md:border-none p-3 md:p-0 md:absolute md:bottom-6 md:left-1/2 md:-translate-x-1/2 md:max-w-4xl z-50">
            <div class="relative bg-white md:border border-gray-200 rounded-xl md:rounded-2xl md:shadow-[0_8px_30px_rgb(0,0,0,0.12)] p-1 md:p-3 flex items-center gap-2 md:gap-3">
                <input type="file" id="file-upload" accept="application/pdf" class="hidden">
                <button onclick="document.getElementById('file-upload').click()" class="flex items-center gap-2 px-4 py-2.5 bg-gray-900 text-white rounded-lg md:rounded-xl hover:bg-gray-800 text-xs md:text-sm font-semibold transition-colors shadow-md flex-shrink-0 w-full md:w-auto justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m18.375 12.739-7.693 7.693a4.5 4.5 0 0 1-6.364-6.364l10.94-10.94A3 3 0 1 1 19.5 7.372L8.552 18.32m.009-.01-.01.01m5.699-9.941-7.81 7.81a1.5 1.5 0 0 0 2.112 2.13" /></svg>
                    <span>Attach PDF</span>
                </button>
                <div id="file-name" class="hidden md:block flex-1 px-3 text-sm text-gray-400 font-medium truncate">No file attached...</div>
            </div>
        </div>
    </main>

    <aside class="hidden xl:flex w-80 bg-white border-l border-gray-200 flex-col flex-shrink-0 z-20">
         <div class="h-16 flex items-center justify-between px-6 border-b border-gray-50/50">
            <h3 class="font-bold text-sm text-gray-900">Recent Highlights</h3>
         </div>
         <div class="p-4 space-y-3 overflow-y-auto" id="history-list">
             <div id="empty-history" class="p-3 bg-gray-50 rounded-lg border border-gray-100 text-center text-xs text-gray-400 mt-5">
                 Your processed PDFs will show here
             </div>
         </div>
    </aside>

    <script>
        let currentMode = 'study'; 
        let historyStore = {}; 

        function selectMode(mode, element) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('mode-selected', 'border-blue-500');
                card.classList.add('border-gray-100');
            });
            element.classList.add('mode-selected', 'border-blue-500');
            element.classList.remove('border-gray-100');
        }

        function renderSentences(sentences, count) {
            const listEl = document.getElementById('extracted-sentences-list');
            listEl.innerHTML = ''; 
            document.getElementById('sentence-count-badge').textContent = count;
            
            sentences.forEach(sentence => {
                const li = document.createElement('li');
                li.className = "pl-2 leading-relaxed border-b border-gray-100 pb-3 last:border-0";
                li.textContent = sentence;
                listEl.appendChild(li);
            });
        }

        function resetApp() {
            document.getElementById('welcome-screen').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('flex');
            document.getElementById('status-badge').classList.add('hidden');
            document.getElementById('download-pdf-btn').classList.add('hidden'); // Hide download button
            document.getElementById('file-upload').value = '';
            document.getElementById('file-name').textContent = 'No file attached...';
            document.getElementById('file-name').classList.remove('text-gray-900');
            document.getElementById('header-title').textContent = 'AI Analyzer';
        }

        function loadFromHistory(id) {
            const session = historyStore[id];
            if(session) {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('flex');
                
                document.getElementById('pdf-viewer').src = session.url;
                renderSentences(session.sentences, session.count);
                
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('result-container').classList.add('flex');
                
                document.getElementById('header-title').textContent = session.filename;
                document.getElementById('status-badge').classList.remove('hidden');

                /////////////// Setup
                const downloadBtn = document.getElementById('download-pdf-btn');
                downloadBtn.classList.remove('hidden');
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = session.url;
                    a.download = session.filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };
            }
        }

        document.getElementById('file-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-name').classList.add('text-gray-900');
            document.getElementById('status-badge').classList.add('hidden');
            document.getElementById('download-pdf-btn').classList.add('hidden');
            
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('flex');
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('loading-screen').classList.add('flex');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('mode', currentMode); 

            try {
                const response = await fetch('https://ibrahim54656436-smart-highlighter-api.hf.space/process-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error(`Server Error`);

                const data = await response.json();
                const byteCharacters = atob(data.pdf_base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: 'application/pdf'});
                const pdfUrl = URL.createObjectURL(blob);

                const sessionId = Date.now().toString();
                historyStore[sessionId] = {
                    url: pdfUrl, sentences: data.sentences, count: data.total_sentences, filename: data.filename, mode: currentMode
                };

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('flex');
                
                document.getElementById('pdf-viewer').src = pdfUrl;
                renderSentences(data.sentences, data.total_sentences);

                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('result-container').classList.add('flex');

                document.getElementById('header-title').textContent = data.filename;
                document.getElementById('status-badge').classList.remove('hidden');

                // NEW: Setup download button
                const downloadBtn = document.getElementById('download-pdf-btn');
                downloadBtn.classList.remove('hidden');
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = pdfUrl;
                    a.download = data.filename || 'highlighted_document.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };

                const historyList = document.getElementById('history-list');
                const emptyMsg = document.getElementById('empty-history');
                if(emptyMsg) emptyMsg.remove();

                historyList.insertAdjacentHTML('afterbegin', `
                    <div onclick="loadFromHistory('${sessionId}')" class="p-3 bg-white hover:bg-blue-50 rounded-xl border border-gray-200 shadow-sm cursor-pointer transition-all hover:border-blue-300">
                        <h4 class="text-xs font-bold text-gray-800 truncate mb-1" title="${file.name}">${file.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-[9px] text-blue-600 bg-blue-100 px-2 py-0.5 rounded-md uppercase font-bold tracking-wider">${currentMode}</span>
                            <span class="text-[10px] text-gray-500 font-medium">🔥 ${data.total_sentences} Insights</span>
                        </div>
                    </div>
                `);

            } catch (error) {
                console.error(error);
                alert('Connection Failed! The API server might be sleeping or unreachable.');
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('flex');
                document.getElementById('welcome-screen').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
